<!DOCTYPE html>
<html>
<head>
    <title>Image and Link Display</title>
</head>
<body>

    <h1>Image and Its Link</h1>

    <p>Below is an image:</p>

    <!-- Clickable Image -->
    <a href="https://via.placeholder.com/300" target="_blank">
        <img src="https://via.placeholder.com/300"
             alt="Sample Image"
             width="300"
             height="200">
    </a>

    <p>
        Image Link:
        <a href="https://via.placeholder.com/300" target="_blank">
            https://via.placeholder.com/300
        </a>
    </p>

</body>
</html>
