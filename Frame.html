<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frame Layout</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .header {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .menu {
            width: 30%;
            border-right: 2px solid #efeaea;
        }

        .content {
            width: 70%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>HTML</h1>
    </div>

    <div class="container">


        <!-- Left Menu Frame -->
        <div class="menu">
            <iframe src="Basics.html"></iframe>
        </div>

        <!-- Right Content Frame -->
        <div class="content">
            <iframe src="image.html"></iframe>
        </div>

    </div>

</body>
</html>
